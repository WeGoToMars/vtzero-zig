name: Benchmarks

on:
  push:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      MAPBOX_VTZERO_REV: d4e8e099a32c37dfb54c04539ce73851bbe35917
    steps:
      - uses: actions/checkout@v6
      - name: Clone mapbox/vtzero (test data + mvt-fixtures + protozero submodules)
        run: |
          git clone https://github.com/mapbox/vtzero.git vtzero
          git -C vtzero checkout "$MAPBOX_VTZERO_REV"
          git -C vtzero submodule update --init --recursive
      - name: Clone mapbox/protozero (headers + test data)
        run: |
          git clone --depth 1 https://github.com/mapbox/protozero.git vtzero/third_party/protozero
      - uses: mlugg/setup-zig@v2
      - name: Run summary benchmarks
        run: zig build bench
      - name: Run single-tile parse sub-step benchmarks
        run: zig build bench-single-tile
      - name: Run C++ single-tile parse sub-step benchmarks
        run: zig build bench-single-tile-cpp
