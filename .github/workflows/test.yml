name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MAPBOX_VTZERO_REV: d4e8e099a32c37dfb54c04539ce73851bbe35917
    steps:
      - uses: actions/checkout@v6
      - name: Clone mapbox/vtzero (test data + mvt-fixtures submodule)
        run: |
          git clone https://github.com/mapbox/vtzero.git mapbox-vtzero
          git -C mapbox-vtzero checkout "$MAPBOX_VTZERO_REV"
          git -C mapbox-vtzero submodule update --init --recursive
          mkdir -p vtzero/test
          cp -a mapbox-vtzero/test/data vtzero/test/
          cp -a mapbox-vtzero/test/mvt-fixtures vtzero/test/
          rm -rf mapbox-vtzero
      - uses: mlugg/setup-zig@v2
      - name: Install kcov dependencies
        run: sudo apt-get install -y binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev
      - name: Build kcov from source
        run: |
          git clone https://github.com/SimonKagstrom/kcov.git
          cd kcov && mkdir build && cd build
          cmake .. && make -j$(nproc)
          sudo make install
      - name: Run all tests
        run: zig build coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: kcov-out/test/cobertura.xml
          format: cobertura
          fail-on-error: false
