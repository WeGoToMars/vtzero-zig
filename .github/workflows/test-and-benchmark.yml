name: Run all tests

on:
  push:
  pull_request:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    env:
      MAPBOX_VTZERO_REV: d4e8e099a32c37dfb54c04539ce73851bbe35917
    steps:
      - uses: actions/checkout@v6
      - name: Clone mapbox/vtzero (test data + mvt-fixtures submodule)
        run: |
          git clone https://github.com/mapbox/vtzero.git mapbox-vtzero
          git -C mapbox-vtzero checkout "$MAPBOX_VTZERO_REV"
          git -C mapbox-vtzero submodule update --init --recursive
          mkdir -p vtzero/test vtzero/third_party/protozero
          cp -a mapbox-vtzero/include vtzero/
          cp -a mapbox-vtzero/test/data vtzero/test/
          cp -a mapbox-vtzero/test/mvt-fixtures vtzero/test/
          rm -rf mapbox-vtzero
      - name: Clone mapbox/protozero headers
        run: |
          git clone --depth 1 https://github.com/mapbox/protozero.git mapbox-protozero
          mkdir -p vtzero/third_party/protozero
          cp -a mapbox-protozero/include vtzero/third_party/protozero/
          rm -rf mapbox-protozero
      - uses: mlugg/setup-zig@v2
      - name: Print toolchain and runner diagnostics
        run: |
          echo "=== System ==="
          uname -a
          lscpu
          echo
          echo "=== Toolchains ==="
          zig version
          zig env
          g++ --version
      - name: Run all tests
        run: zig build test
      - name: Run summary benchmarks
        run: zig build bench
      - name: Run single-tile parse sub-step benchmarks
        run: zig build bench-single-tile
      - name: Run C++ single-tile parse sub-step benchmarks
        run: zig build bench-single-tile-cpp
